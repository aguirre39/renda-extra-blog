# ARQUIVO: netlify.toml
# Localização: Raiz do seu projeto principal

# -----------------------------------------------------------
# ARQUIVO DE CONFIGURAÇÃO NETLIFY - ROTEAMENTO AVANÇADO
# Objetivo: Servir múltiplos sites externos dentro do domínio principal
# Status 200 = Proxy (Mantém a URL original no navegador)
# -----------------------------------------------------------

# ===========================================================
# 1. PROJETO: CORAÇÃO BLINDADO
# ===========================================================

# Regra para a Raiz (Acesso direto à pasta)
[[redirects]]
  from = "/coracao_blindado"
  to = "https://coracaoblindado2.netlify.app/"
  status = 200
  force = true

# Regra para a Raiz com barra (Segurança extra)
[[redirects]]
  from = "/coracao_blindado/"
  to = "https://coracaoblindado2.netlify.app/"
  status = 200
  force = true

# Regra CRÍTICA: Carregamento de Ativos (Imagens, Vídeos, CSS, JS)
# Captura qualquer arquivo dentro da pasta e busca no servidor de origem
[[redirects]]
  from = "/coracao_blindado/*"
  to = "https://coracaoblindado2.netlify.app/:splat"
  status = 200
  force = true


